name: Article Pipeline

on:
  schedule:
    # Mon + Thu at 09:00 UTC (≈ 2am US Pacific, 14:00 Pakistan)
    - cron: '0 9 * * 1,4'
  workflow_dispatch:
    inputs:
      manual_topic:
        description: 'Optional: write about a specific topic (skips trend detection)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-article:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'scripts/pipeline/requirements.txt'

      - name: Install dependencies
        run: pip install -r scripts/pipeline/requirements.txt

      - name: Run pipeline
        id: pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MANUAL_TOPIC: ${{ github.event.inputs.manual_topic }}
        # Invoke as a module so relative imports work (from . import config)
        run: python -m scripts.pipeline.runner

      - name: Read pipeline metadata
        id: meta
        if: success()
        run: |
          if [ -f scripts/pipeline/output/metadata.json ]; then
            echo "title=$(jq -r '.title' scripts/pipeline/output/metadata.json)" >> "$GITHUB_OUTPUT"
            echo "slug=$(jq -r '.slug' scripts/pipeline/output/metadata.json)" >> "$GITHUB_OUTPUT"
            echo "topic_source=$(jq -r '.topic_source' scripts/pipeline/output/metadata.json)" >> "$GITHUB_OUTPUT"
            echo "quality_score=$(jq -r '.quality_score' scripts/pipeline/output/metadata.json)" >> "$GITHUB_OUTPUT"
            echo "word_count=$(jq -r '.word_count' scripts/pipeline/output/metadata.json)" >> "$GITHUB_OUTPUT"
            {
              echo 'concerns<<CONCERNS_EOF'
              jq -r '.concerns | if length == 0 then "_None — looks good!_" else map("- " + .) | join("\n") end' scripts/pipeline/output/metadata.json
              echo 'CONCERNS_EOF'
            } >> "$GITHUB_OUTPUT"
            echo "has_article=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_article=false" >> "$GITHUB_OUTPUT"
            echo "Pipeline produced no article (no fresh topics, all duplicates, or generation failed)"
          fi

      - name: Create Pull Request
        if: steps.meta.outputs.has_article == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "auto: draft article — ${{ steps.meta.outputs.title }}"
          title: "📝 Auto-draft: ${{ steps.meta.outputs.title }}"
          body: |
            ## 🤖 Pipeline-Generated Draft

            **Topic source:** ${{ steps.meta.outputs.topic_source }}
            **Quality score:** ${{ steps.meta.outputs.quality_score }}/10
            **Word count:** ${{ steps.meta.outputs.word_count }}

            ### ⚠️ Review Checklist (do not skim-merge)

            - [ ] Verify all numerical claims, especially dosing math
            - [ ] Verify cited studies are real (search PubMed for the title)
            - [ ] Edit for personal voice — add unique insights or real-world detail
            - [ ] Check internal links resolve correctly
            - [ ] Verify each FAQ answer actually matches its question
            - [ ] Read the full article carefully

            ### Concerns Flagged by Quality Check

            ${{ steps.meta.outputs.concerns }}

            ---

            *Generated by `.github/workflows/article-pipeline.yml`. Edit directly in this PR before merging. Once merged, Vercel auto-deploys and the article goes live.*
          branch: auto/article-${{ steps.meta.outputs.slug }}
          base: main
          delete-branch: true
          add-paths: |
            content/blog/*.mdx
